---
- name: Setup Debian for Vagrant
  hosts: all
  become: yes
  tasks:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install additional packages for Debian
      apt:
        name:
          - vim
          - wget
          - curl
          - git
          - bash-completion
          - cloud-init
          - cloud-guest-utils
          - qemu-guest-agent
          - python3
          - python3-pip
        state: present

    - name: Load VirtIO modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - virtio_balloon
        - virtio_console
        - virtio_rng
      ignore_errors: yes

    - name: Enable qemu-guest-agent service
      systemd:
        name: qemu-guest-agent
        enabled: yes
        state: started
      retries: 3
      delay: 5
      register: qemu_agent_result
      until: qemu_agent_result is succeeded

    - name: Configure cloud-init for Vagrant
      copy:
        dest: /etc/cloud/cloud.cfg.d/90_vagrant.cfg
        content: |
          datasource_list: [ NoCloud, ConfigDrive, None ]
        mode: '0644'

    - name: Disable cloud-init network configuration
      copy:
        dest: /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
        content: |
          network: {config: disabled}
        mode: '0644'

    - name: Check if GRUB config exists
      stat:
        path: /etc/default/grub
      register: grub_config

    - name: Configure GRUB for consistent network device naming
      lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="net.ifnames=0 biosdevname=0"'
      notify: update grub
      when: grub_config.stat.exists

  handlers:
    - name: update grub
      command: update-grub
      when: grub_config.stat.exists
