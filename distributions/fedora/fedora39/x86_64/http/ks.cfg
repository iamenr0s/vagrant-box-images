# Kickstart file for Fedora 39 x86_64

# Use text mode install
text

# System language
lang en_US.UTF-8

# Keyboard layouts
keyboard us

# Enable network
network --bootproto=dhcp --device=link --activate

# System timezone
timezone UTC

# Root password
rootpw --plaintext vagrant

# Create user
user --name=vagrant --password=vagrant --plaintext --groups=wheel

# System authorization information
auth --enableshadow --passalgo=sha512

# SELinux configuration
selinux --enforcing

# Firewall configuration
firewall --enabled --service=ssh

# System services
services --enabled="chronyd,sshd"

# System bootloader configuration
bootloader --location=mbr

# Clear the Master Boot Record
zerombr

# Partition clearing information
clearpart --all --initlabel

# Disk partitioning information
autopart --type=lvm

# Reboot after installation
reboot

%packages
@core
@standard
@development-tools
sudo
openssh-server
openssh-clients
%end

%post
# Configure sudo
echo 'vagrant ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/vagrant
chmod 0440 /etc/sudoers.d/vagrant

# Configure SSH for Vagrant
sed -i 's/^#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/^#UseDNS yes/UseDNS no/' /etc/ssh/sshd_config

# Create vagrant user SSH directory
mkdir -p /home/vagrant/.ssh
chmod 700 /home/vagrant/.ssh

# Add Vagrant insecure public key
cat > /home/vagrant/.ssh/authorized_keys << 'EOF'
ssh-rsa  vagrant insecure public key
EOF

# Set permissions on the key
chmod 600 /home/vagrant/.ssh/authorized_keys
chown -R vagrant:vagrant /home/vagrant/.ssh
%end